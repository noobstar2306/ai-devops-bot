# .github/workflows/deploy-dashboard.yml
# This workflow deploys your dashboard to GitHub Pages
# every time you push to main.

name: Deploy Dashboard

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # lets you trigger it manually too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Gemini API key
        run: |
          sed -i "s/PASTE_GEMINI_TIPS_KEY_HERE/${{ secrets.GEMINI_TIPS_KEY }}/g" dashboard/index.html
          sed -i "s/PASTE_GEMINI_TIPS_KEY_HERE/${{ secrets.GEMINI_TIPS_KEY }}/g" hobbies.html

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
