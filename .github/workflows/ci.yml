# .github/workflows/ci.yml

name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        id: run_tests
        run: |
          pytest test_app.py -v --tb=short --cov=app --cov-report=term-missing 2>&1 | tee test_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # Runs only on PRs when tests fail — explains what broke
      - name: AI explains the failure
        if: steps.run_tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ERROR_LOG=$(cat test_output.txt)
          python explain_failure.py "$ERROR_LOG"

      # Runs on every PR — reviews the code changes
      - name: AI code review
        if: github.event_name == 'pull_request'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python review_code.py

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

      - name: Check coverage threshold
        run: |
          pytest test_app.py --cov=app --cov-fail-under=60 -q
